name: Dynamic Databricks Notebook Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Install jq & curl
      run: sudo apt-get update && sudo apt-get install -y jq curl
    
    - name: Export multiple notebooks (raw)
      run: |
        ORIGIN_HOST=${{ secrets.DATABRICKS_ORIGIN_HOST }}
        ORIGIN_TOKEN=${{ secrets.DATABRICKS_ORIGIN_TOKEN }}
        NOTEBOOK_BASE="/Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com/smartdata_project/proceso"
        NOTEBOOKS=("0.Preparacion_Ambiente" "1.Bronze_Ingestion" "1.Silver_transform_products" "2.Silver_transform_persons" "3.Silver_transform_sales" "1.Gold_Load_products" "2.Gold_Load_persons" "3.Gold_Load_sales")
        mkdir -p notebooks_to_deploy
        for nb in "${NOTEBOOKS[@]}"; do
          echo "Exportando $nb en modo DBC..."
          # Cambiado format=SOURCE a format=DBC y la extensión a .dbc
          curl -s -X GET \
            -H "Authorization: Bearer $ORIGIN_TOKEN" \
            "$ORIGIN_HOST/api/2.0/workspace/export?path=$NOTEBOOK_BASE/$nb&format=DBC" \
            --output "notebooks_to_deploy/$nb.dbc"
        done
    
    - name: Deploy notebooks to Destination Workspace
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        DEST_BASE="/smartdata_project/proceso"
        for file in notebooks_to_deploy/*.dbc; do
          name=$(basename "$file" .py)
          dest_path="$DEST_BASE/$name"
          echo "Creando carpeta $DEST_BASE si no existe..."
          curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"path\":\"$DEST_BASE\"}" \
            "$DEST_HOST/api/2.0/workspace/mkdirs"
          echo "Importando $file → $dest_path"
          # Cambiado format=SOURCE a format=DBC
          response=$(curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "path=$dest_path" \
            -F "format=DBC" \
            -F "overwrite=true" \
            -F "content=@$file" \
            "$DEST_HOST/api/2.0/workspace/import")
          echo "Response: $response"
        done
    
    - name: Check if workflow exists and delete if necessary
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        WORKFLOW_NAME="WF_ADB"
        
        echo "Verificando si existe el workflow: $WORKFLOW_NAME"
        
        workflows_response=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.1/jobs/list")
        
        existing_job_id=$(echo "$workflows_response" | jq -r --arg name "$WORKFLOW_NAME" '.jobs[]? | select(.settings.name == $name) | .job_id')
        
        if [ "$existing_job_id" != "" ] && [ "$existing_job_id" != "null" ]; then
          echo "Workflow encontrado con ID: $existing_job_id. Eliminando..."
          delete_response=$(curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $existing_job_id}" \
            "$DEST_HOST/api/2.1/jobs/delete")
          echo "Delete response: $delete_response"
        else
          echo "No se encontró workflow existente con nombre: $WORKFLOW_NAME"
        fi
    
    - name: Create Databricks Workflow WF_ADB
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        
        echo "Creando workflow: WF_ADB con Serverless compute"
        
        cat > workflow_config.json << 'EOF'
        {
          "name": "WF_ADB",
          "format": "MULTI_TASK",
          "tasks": [
            {
              "task_key": "PrepAmb",
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/0.Preparacion_Ambiente",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "raw_name": "raw",
                  "volume_name": "autoloader",
                  "credential_name": "credential",
                  "bronze_name": "bronze",
                  "silver_name": "silver",
                  "gold_name": "gold"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {},
              "environment_key": "Raw_ingestion_environment"
            },
            {
              "task_key": "Bronze_ingestion",
              "depends_on": [
                {
                  "task_key": "PrepAmb"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/1.Bronze_Ingestion",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_sink": "bronze",
                  "schema_source": "raw",
                  "source_product": "federated_sql_catalog.source.dim_products",
                  "sink_product": "bronze_products",
                  "source_person": "federated_sql_catalog.source.dim_persons",
                  "sink_person": "bronze_persons",
                  "source_sales": "abfss://raw@adlssmartdataeastus2001.dfs.core.windows.net/sales/",
                  "sink_sales": "bronze_sales"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {},
              "environment_key": "Raw_ingestion_environment"
            },
            {
              "task_key": "Silver_Sales",
              "depends_on": [
                {
                  "task_key": "Bronze_ingestion"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/3.Silver_transform_sales",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_source": "bronze",
                  "schema_sink": "silver",
                  "source_sales": "bronze_sales",
                  "sink_sales": "silver_sales",
                  "w_sales": "{{tasks.Bronze_ingestion.values.w_sales}}"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {}
            },
            {
              "task_key": "Gold_Sales",
              "depends_on": [
                {
                  "task_key": "Silver_Sales"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/3.Gold_Load_sales",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_source": "silver",
                  "schema_sink": "gold",
                  "source_sales": "silver_sales",
                  "sink_sales": "gold_sales",
                  "w_sales": "{{tasks.Bronze_ingestion.values.w_sales}}"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {}
            },
            {
              "task_key": "Silver_persons",
              "depends_on": [
                {
                  "task_key": "Bronze_ingestion"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/2.Silver_transform_persons",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_source": "bronze",
                  "schema_sink": "silver",
                  "source_persons": "bronze_persons",
                  "sink_persons": "silver_persons",
                  "w_persons": "{{tasks.Bronze_ingestion.values.w_persons}}"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {}
            },
            {
              "task_key": "Gold_Persons",
              "depends_on": [
                {
                  "task_key": "Silver_persons"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "//Workspace/smartdata_project/proceso/2.Gold_Load_persons",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_source": "silver",
                  "schema_sink": "gold",
                  "source_persons": "silver_persons",
                  "sink_persons": "gold_persons",
                  "w_persons": "{{tasks.Bronze_ingestion.values.w_persons}}"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {}
            },
            {
              "task_key": "Silver_products",
              "depends_on": [
                {
                  "task_key": "Bronze_ingestion"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/1.Silver_transform_products",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_source": "bronze",
                  "schema_sink": "silver",
                  "source_products": "bronze_products",
                  "sink_products": "silver_products",
                  "w_products": "{{tasks.Bronze_ingestion.values.w_products}}"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {}
            },
            {
              "task_key": "Gold_products",
              "depends_on": [
                {
                  "task_key": "Silver_products"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "notebook_task": {
                "notebook_path": "/Workspace/smartdata_project/proceso/1.Gold_Load_products",
                "base_parameters": {
                  "catalog_name": "smartdata_project",
                  "schema_source": "silver",
                  "schema_sink": "gold",
                  "source_products": "silver_products",
                  "sink_products": "gold_products",
                  "w_products": "{{tasks.Bronze_ingestion.values.w_products}}"
                },
                "source": "WORKSPACE"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {}
            },
            {
              "task_key": "Snapshot_Materialization",
              "depends_on": [
                {
                  "task_key": "Gold_Persons"
                },
                {
                  "task_key": "Gold_products"
                },
                {
                  "task_key": "Gold_Sales"
                }
              ],
              "run_if": "ALL_SUCCESS",
              "dbt_task": {
                "project_directory": "dbt_project",
                "commands": [
                  "dbt deps",
                  "dbt snapshot"
                ],
                "schema": "gold",
                "warehouse_id": "855798cc5e6b302e",
                "catalog": "smartdata_project",
                "source": "GIT"
              },
              "timeout_seconds": 0,
              "email_notifications": {},
              "webhook_notifications": {},
              "environment_key": "dbt-default"
            }
          ],
          "git_source": {
            "git_url": "https://github.com/Mamacedo23/smart_data_dbt.git",
            "git_provider": "gitHub",
            "git_branch": "main"
          },
          "environments": [
            {
              "environment_key": "Raw_ingestion_environment",
              "spec": {
                "environment_version": "5"
              }
            },
            {
              "environment_key": "dbt-default",
              "spec": {
                "dependencies": [
                  "dbt-databricks>=1.0.0,<2.0.0"
                ],
                "environment_version": "5"
              }
            }
          ],
          "performance_target": "PERFORMANCE_OPTIMIZED",
          "schedule": {
            "quartz_cron_expression": "0 0 8 * * ?",
            "timezone_id": "America/Lima",
            "pause_status": "PAUSED"
          },
          "email_notifications": {
            "on_failure": [],
            "on_success": [],
            "no_alert_for_skipped_runs": false
          },
          "webhook_notifications": {},
          "timeout_seconds": 7200,
          "max_concurrent_runs": 1,
          "tags": {
            "environment": "production",
            "created_by": "github_actions",
            "project": "automated_deployment",
            "compute": "serverless"
          }
        }
        EOF
        
        create_response=$(curl -s -X POST \
          -H "Authorization: Bearer $DEST_TOKEN" \
          -H "Content-Type: application/json" \
          -d @workflow_config.json \
          "$DEST_HOST/api/2.1/jobs/create")
        
        echo "Workflow creation response: $create_response"
        
        job_id=$(echo "$create_response" | jq -r '.job_id')
        
        if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
          echo "✅ Workflow 'WF_ADB' creado exitosamente con ID: $job_id"
          echo "WORKFLOW_JOB_ID=$job_id" >> $GITHUB_ENV
          
          workflow_details=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/get?job_id=$job_id")
          
          echo "Detalles del workflow:"
          echo "$workflow_details" | jq '.settings | {name, tasks: (.tasks | map({task_key, notebook_task: .notebook_task.notebook_path}))}'
        else
          echo "❌ Error al crear el workflow"
          echo "Response completo: $create_response"
          exit 1
        fi
    
    - name: Validate Workflow Configuration
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        WORKFLOW_NAME="WF_ADB"
        
        echo "🔍 Validando la configuración del workflow creado..."
        
        workflows_list=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.1/jobs/list")
        
        job_id=$(echo "$workflows_list" | jq -r --arg name "$WORKFLOW_NAME" '.jobs[]? | select(.settings.name == $name) | .job_id')
        
        if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
          echo "✅ Workflow encontrado con ID: $job_id"
          
          job_details=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/get?job_id=$job_id")
          
          echo "📋 Resumen del workflow:"
          echo "Nombre: $(echo "$job_details" | jq -r '.settings.name')"
          echo "Número de tareas: $(echo "$job_details" | jq '.settings.tasks | length')"
          echo ""
          echo "📝 Tareas configuradas:"
          echo "$job_details" | jq -r '.settings.tasks[] | "- " + .task_key + " → " + (.notebook_task.notebook_path // "(dbt task)")'
          echo ""
          echo "⚡ Compute: Serverless"
          
        else
          echo "❌ No se pudo encontrar el workflow creado"
          exit 1
        fi
    
    - name: Execute Workflow WF_ADB
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        WORKFLOW_NAME="WF_ADB"
        
        echo "🚀 Ejecutando workflow: $WORKFLOW_NAME"
        
        workflows_list=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.1/jobs/list")
        
        job_id=$(echo "$workflows_list" | jq -r --arg name "$WORKFLOW_NAME" '.jobs[]? | select(.settings.name == $name) | .job_id')
        
        if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
          echo "✅ Workflow encontrado con ID: $job_id"
          
          run_response=$(curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $job_id}" \
            "$DEST_HOST/api/2.1/jobs/run-now")
          
          run_id=$(echo "$run_response" | jq -r '.run_id')
          
          if [ "$run_id" != "" ] && [ "$run_id" != "null" ]; then
            echo "🎯 Workflow ejecutado exitosamente!"
            echo "Run ID: $run_id"
            echo "WORKFLOW_RUN_ID=$run_id" >> $GITHUB_ENV
            echo "WORKFLOW_JOB_ID=$job_id" >> $GITHUB_ENV
            echo "🔗 URL del workflow: $DEST_HOST/jobs/$job_id/runs/$run_id"
          else
            echo "❌ Error al ejecutar el workflow"
            echo "Response: $run_response"
            exit 1
          fi
        else
          echo "❌ No se pudo encontrar el workflow para ejecutar"
          exit 1
        fi
    
    - name: Monitor Workflow Execution
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
        RUN_ID="${{ env.WORKFLOW_RUN_ID }}"
        JOB_ID="${{ env.WORKFLOW_JOB_ID }}"
        
        echo "📊 Monitoreando ejecución del workflow..."
        echo "Job ID: $JOB_ID"
        echo "Run ID: $RUN_ID"
        
        max_wait_time=600
        wait_time=0
        check_interval=30
        
        while [ $wait_time -lt $max_wait_time ]; do
          run_status=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/runs/get?run_id=$RUN_ID")
          
          state=$(echo "$run_status" | jq -r '.state.life_cycle_state')
          result_state=$(echo "$run_status" | jq -r '.state.result_state // "RUNNING"')
          
          echo "⏱️  Estado actual: $state ($result_state) - Tiempo transcurrido: ${wait_time}s"
          echo "$run_status" | jq -r '.tasks[]? | "  📋 " + .task_key + ": " + .state.life_cycle_state + " (" + (.state.result_state // "RUNNING") + ")"'
          
          case "$state" in
            "TERMINATED")
              if [ "$result_state" = "SUCCESS" ]; then
                echo "🎉 ¡Workflow completado exitosamente!"
                echo ""
                echo "📈 Resumen de ejecución:"
                echo "$run_status" | jq -r '.tasks[]? | "✅ " + .task_key + " → " + (.state.result_state // "SUCCESS")'
                
                start_time=$(echo "$run_status" | jq -r '.start_time')
                end_time=$(echo "$run_status" | jq -r '.end_time')
                if [ "$start_time" != "null" ] && [ "$end_time" != "null" ]; then
                  duration=$((($end_time - $start_time) / 1000))
                  echo "⏰ Duración total: ${duration} segundos"
                fi
                
                exit 0
              else
                echo "❌ Workflow terminó con errores: $result_state"
                echo "$run_status" | jq -r '.tasks[]? | "❌ " + .task_key + ": " + (.state.result_state // "UNKNOWN")'
                exit 1
              fi
              ;;
            "INTERNAL_ERROR"|"SKIPPED")
              echo "❌ Workflow falló con estado: $state"
              exit 1
              ;;
            *)
              echo "⏳ Workflow aún ejecutándose..."
              ;;
          esac
          
          sleep $check_interval
          wait_time=$((wait_time + check_interval))
        done
        
        echo "⚠️  Timeout: El workflow aún se está ejecutando después de $max_wait_time segundos"
        echo "🔗 Verifica el estado en: $DEST_HOST/jobs/$JOB_ID/runs/$RUN_ID"
        echo "ℹ️  El workflow seguirá ejecutándose en Databricks"
        exit 0
    
    - name: Clean up
      run: |
        rm -rf notebooks_to_deploy
        rm -f workflow_config.json
    
    - name: Done
      run: |
        echo "🎉 ¡Despliegue y ejecución completados exitosamente!"
        echo ""
        echo "📊 Resumen:"
        echo "✅ Notebooks desplegados"
        echo "✅ Workflow creado: WF_ADB"
        echo "✅ Tareas configuradas: 9 tareas (PrepAmb → Bronze → Silver/Gold → dbt)"
        echo "⚡ Compute: Serverless"
        echo "🚀 Workflow ejecutado automáticamente"
        echo ""
        echo "🔗 Accede a tu workspace de Databricks para ver los resultados detallados"